<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Tracking - Real-Time Sync</title>
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f1f5f9; color: #334155; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* LOGIN */
        .login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #1e3a5f 0%, #2d5a8c 100%); }
        .login-container { background: white; padding: 40px; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .login-container h1 { font-size: 28px; margin-bottom: 10px; color: #1e3a5f; }
        .login-container p { color: #666; margin-bottom: 30px; }
        .login-btn { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .login-btn-primary { background: linear-gradient(135deg, #1e3a5f 0%, #2d5a8c 100%); color: white; }
        .login-btn-primary:hover { transform: translateY(-2px); }
        .login-btn-secondary { background: #e2e8f0; color: #1e3a5f; }
        .login-btn-secondary:hover { background: #cbd5e1; }
        #passwordField { display: none; }
        #passwordInput { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; margin-bottom: 10px; }
        
        /* HEADER */
        header { background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%); color: white; padding: 20px; border-radius: 12px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 24px; }
        .header-right { display: flex; gap: 20px; align-items: center; }
        .stats { display: flex; gap: 16px; }
        .stat { background: rgba(20, 184, 166, 0.15); padding: 12px 18px; border-radius: 8px; text-align: center; }
        .stat-label { font-size: 12px; color: #cbd5e1; text-transform: uppercase; }
        .stat-value { font-size: 24px; font-weight: 700; color: #14b8a6; }
        
        .sync-status { padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; display: flex; gap: 6px; align-items: center; }
        .sync-status.online { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .sync-status.offline { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .user-badge { background: rgba(255,255,255,0.2); padding: 8px 14px; border-radius: 6px; font-size: 13px; }
        .logout-btn { padding: 8px 14px; background: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .logout-btn:hover { background: #dc2626; }
        
        /* CONTROLS */
        .controls { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
        .search-wrapper { display: flex; gap: 8px; flex: 1; max-width: 500px; }
        #searchInput { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; }
        
        button { padding: 12px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-secondary { background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%); color: white; }
        .btn-tertiary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); color: white; }
        .btn-export { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); color: white; }
        .btn-import { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; }
        
        /* TABS */
        .tabs { display: flex; border-bottom: 2px solid #e2e8f0; margin-bottom: 24px; }
        .tab { padding: 12px 20px; background: transparent; border: none; cursor: pointer; color: #64748b; font-weight: 500; border-bottom: 3px solid transparent; }
        .tab.active { color: #2563eb; border-bottom-color: #2563eb; }
        
        /* TABLE */
        .table-wrapper { background: #f1f5f9; border-radius: 12px; overflow-x: auto; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #e2e8f0; padding: 16px; text-align: left; font-weight: 600; border-bottom: 1px solid #cbd5e1; color: #475569; text-transform: uppercase; font-size: 12px; }
        td { padding: 16px; border-bottom: 1px solid #e2e8f0; color: #334155; }
        tr:hover { background: #f8fafc; }
        
        .empty-state { text-align: center; padding: 40px; color: #94a3b8; }
        
        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 28px; border-radius: 12px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-content h2 { margin-bottom: 20px; color: #1e293b; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #334155; font-size: 13px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; font-family: inherit; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        
        /* TOAST */
        #toast { position: fixed; bottom: 20px; right: 20px; background: #22c55e; color: white; padding: 14px 20px; border-radius: 6px; display: none; z-index: 2000; }
        #toast.show { display: block; }
        
        .btn-small { padding: 6px 10px; font-size: 11px; background: #e0e7ff; color: #4f46e5; border: none; border-radius: 6px; cursor: pointer; }
        .btn-small:hover { background: #c7d2fe; }
        .btn-delete { background: #fee2e2 !important; color: #991b1b !important; }
        
        .main-content { display: none; }
        .main-content.active { display: block; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .loading { text-align: center; padding: 20px; color: #94a3b8; }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-container">
            <h1>📦 Delivery Tracking</h1>
            <p>Solid Horizon & Chan A Yab</p>
            <button class="login-btn login-btn-primary" onclick="showPasswordField()">🔒 Solid Horizon (Password)</button>
            <div id="passwordField">
                <input type="password" id="passwordInput" placeholder="Enter password" />
                <button class="login-btn login-btn-primary" onclick="loginSolidHorizon()">Login</button>
            </div>
            <button class="login-btn login-btn-secondary" onclick="loginChanAYab()">👥 Chan A Yab (Open Access)</button>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="main-content" id="mainContent">
        <div class="container">
            <!-- HEADER -->
            <header>
                <h1>📦 Delivery Tracking</h1>
                <div class="header-right">
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-label">Total</div>
                            <div class="stat-value" id="totalCount">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">New</div>
                            <div class="stat-value" id="newCount">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">History</div>
                            <div class="stat-value" id="historyCount">0</div>
                        </div>
                    </div>
                    <div class="sync-status online" id="syncStatus">
                        <span class="sync-dot"></span>
                        <span>Syncing...</span>
                    </div>
                    <div class="user-badge" id="userDisplay">User</div>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </header>

            <!-- CONTROLS -->
            <div class="controls">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="🔍 Search deliveries..." onkeyup="filterTable()">
                    <button class="btn-tertiary" onclick="clearSearch()">Reset</button>
                </div>
                <button class="btn-primary" id="addBtn" onclick="openAddModal()">+ New</button>
                <button class="btn-export" onclick="exportData()">📥 Export</button>
                <button class="btn-import" onclick="document.getElementById('importFile').click()">📤 Import</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
            </div>

            <!-- TABS -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab(event, 'new')">New Deliveries</button>
                <button class="tab" onclick="switchTab(event, 'history')">History</button>
            </div>

            <!-- NEW TAB -->
            <div id="newTab" class="tab-content active">
                <div class="loading" id="loadingNew">Loading...</div>
                <div class="table-wrapper" id="newTableWrapper" style="display:none">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Location</th>
                                <th>Lorry</th>
                                <th>Price</th>
                                <th>Remark</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="newBody"></tbody>
                    </table>
                </div>
                <div class="empty-state" id="emptyNew" style="display:none">No new deliveries</div>
            </div>

            <!-- HISTORY TAB -->
            <div id="historyTab" class="tab-content">
                <div class="loading" id="loadingHistory">Loading...</div>
                <div class="table-wrapper" id="historyTableWrapper" style="display:none">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Location</th>
                                <th>Lorry</th>
                                <th>Price</th>
                                <th>DO No</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
                <div class="empty-state" id="emptyHistory" style="display:none">No history</div>
            </div>
        </div>
    </div>

    <!-- ADD MODAL -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <h2 id="modalTitle">Add Delivery</h2>
            <form onsubmit="saveDelivery(event)">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="f_date" required>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="f_location" placeholder="e.g. Klang" required>
                </div>
                <div class="form-group">
                    <label>Load Date</label>
                    <input type="date" id="f_loadDate" required>
                </div>
                <div class="form-group">
                    <label>Unload Date</label>
                    <input type="date" id="f_unloadDate">
                </div>
                <div class="form-group">
                    <label>Lorry Details</label>
                    <input type="text" id="f_lorry" placeholder="e.g. 20ft Container" required>
                </div>
                <div class="form-group">
                    <label>Unit Price (RM)</label>
                    <input type="number" id="f_price" placeholder="0.00" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>DO No</label>
                    <input type="text" id="f_doNo">
                </div>
                <div class="form-group">
                    <label>Remark</label>
                    <textarea id="f_remark"></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-tertiary" onclick="closeAddModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <script>
        // Supabase Config
        const SUPABASE_URL = 'https://dgszrgmxkjbltfikqzbi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OKuNGDoN6Nb8A-Fssxjvvg_oW3bKsh4';
        
        // Initialize Supabase
        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let editIdx = null;
        let deliveries = [];
        let subscription = null;

        // Check connection status
        supabase.auth.onAuthStateChange((event, session) => {
            updateSyncStatus();
        });

        function updateSyncStatus() {
            const status = document.getElementById('syncStatus');
            status.className = 'sync-status online';
            status.innerHTML = '<span class="sync-dot"></span><span>Synced ✓</span>';
        }

        // LOGIN
        function showPasswordField() {
            document.getElementById('passwordField').style.display = 'block';
            document.getElementById('passwordInput').focus();
        }

        function loginSolidHorizon() {
            const pwd = document.getElementById('passwordInput').value;
            if (pwd === '1234') {
                currentUser = 'Solid Horizon';
                showDashboard();
            } else {
                showToast('Wrong password');
            }
        }

        function loginChanAYab() {
            currentUser = 'Chan A Yab';
            showDashboard();
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContent').classList.add('active');
            document.getElementById('userDisplay').textContent = currentUser;
            document.getElementById('addBtn').style.display = currentUser === 'Solid Horizon' ? 'block' : 'none';
            loadData();
        }

        function logout() {
            if (confirm('Logout?')) {
                currentUser = null;
                if (subscription) subscription.unsubscribe();
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('mainContent').classList.remove('active');
                document.getElementById('passwordField').style.display = 'none';
                document.getElementById('passwordInput').value = '';
            }
        }

        // LOAD DATA FROM SUPABASE
        async function loadData() {
            try {
                showToast('Loading data...');
                
                const { data, error } = await supabase
                    .from('deliveries')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) {
                    showToast('First time? Creating table...');
                    await createTable();
                    deliveries = [];
                } else {
                    deliveries = data || [];
                }

                renderTable();
                setupRealtimeListener();
            } catch (err) {
                console.error('Error:', err);
                showToast('Error loading data');
            }
        }

        // CREATE TABLE IF DOESN'T EXIST
        async function createTable() {
            try {
                await supabase.rpc('create_deliveries_table_if_not_exists');
            } catch (err) {
                console.log('Table creation via RPC failed, will try direct insert');
            }
        }

        // SETUP REALTIME LISTENER
        function setupRealtimeListener() {
            if (subscription) subscription.unsubscribe();

            subscription = supabase
                .channel('deliveries_channel')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'deliveries' },
                    (payload) => {
                        console.log('Change received:', payload);
                        loadData();
                    }
                )
                .subscribe();
        }

        // RENDER TABLE
        function renderTable() {
            const newDeliveries = deliveries.filter(d => !d.do_no);
            const historyDeliveries = deliveries.filter(d => d.do_no);

            // NEW TAB
            let newHTML = '';
            if (newDeliveries.length === 0) {
                document.getElementById('loadingNew').style.display = 'none';
                document.getElementById('newTableWrapper').style.display = 'none';
                document.getElementById('emptyNew').style.display = 'block';
            } else {
                document.getElementById('emptyNew').style.display = 'none';
                document.getElementById('loadingNew').style.display = 'none';
                document.getElementById('newTableWrapper').style.display = 'block';
                
                newDeliveries.forEach(d => {
                    newHTML += `
                        <tr>
                            <td>${d.date}</td>
                            <td>${d.location}</td>
                            <td>${d.lorry}</td>
                            <td>RM${parseFloat(d.price).toFixed(2)}</td>
                            <td><input type="text" value="${d.remark || ''}" style="width:100%;padding:6px;" onchange="updateRemark(${d.id}, this.value)"></td>
                            <td>
                                ${currentUser === 'Solid Horizon' ? `
                                    <button class="btn-small" onclick="editDelivery(${d.id})">Edit</button>
                                    <button class="btn-small btn-delete" onclick="deleteDelivery(${d.id})">Delete</button>
                                ` : ''}
                            </td>
                        </tr>
                    `;
                });
            }
            document.getElementById('newBody').innerHTML = newHTML;

            // HISTORY TAB
            let historyHTML = '';
            if (historyDeliveries.length === 0) {
                document.getElementById('loadingHistory').style.display = 'none';
                document.getElementById('historyTableWrapper').style.display = 'none';
                document.getElementById('emptyHistory').style.display = 'block';
            } else {
                document.getElementById('emptyHistory').style.display = 'none';
                document.getElementById('loadingHistory').style.display = 'none';
                document.getElementById('historyTableWrapper').style.display = 'block';
                
                historyDeliveries.forEach(d => {
                    historyHTML += `
                        <tr>
                            <td>${d.date}</td>
                            <td>${d.location}</td>
                            <td>${d.lorry}</td>
                            <td>RM${parseFloat(d.price).toFixed(2)}</td>
                            <td>${d.do_no}</td>
                            <td>${currentUser === 'Solid Horizon' ? `<button class="btn-small btn-delete" onclick="deleteDelivery(${d.id})">Delete</button>` : ''}</td>
                        </tr>
                    `;
                });
            }
            document.getElementById('historyBody').innerHTML = historyHTML;

            updateStats();
        }

        // UPDATE STATS
        function updateStats() {
            document.getElementById('totalCount').textContent = deliveries.length;
            document.getElementById('newCount').textContent = deliveries.filter(d => !d.do_no).length;
            document.getElementById('historyCount').textContent = deliveries.filter(d => d.do_no).length;
        }

        // MODAL
        function openAddModal() {
            editIdx = null;
            document.getElementById('modalTitle').textContent = 'Add Delivery';
            document.getElementById('f_date').value = new Date().toISOString().split('T')[0];
            document.getElementById('f_location').value = '';
            document.getElementById('f_loadDate').value = '';
            document.getElementById('f_unloadDate').value = '';
            document.getElementById('f_lorry').value = '';
            document.getElementById('f_price').value = '';
            document.getElementById('f_doNo').value = '';
            document.getElementById('f_remark').value = '';
            document.getElementById('addModal').classList.add('active');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
        }

        async function editDelivery(id) {
            if (currentUser !== 'Solid Horizon') return;
            const d = deliveries.find(x => x.id === id);
            if (!d) return;
            
            editIdx = id;
            document.getElementById('modalTitle').textContent = 'Edit Delivery';
            document.getElementById('f_date').value = d.date;
            document.getElementById('f_location').value = d.location;
            document.getElementById('f_loadDate').value = d.load_date;
            document.getElementById('f_unloadDate').value = d.unload_date || '';
            document.getElementById('f_lorry').value = d.lorry;
            document.getElementById('f_price').value = d.price;
            document.getElementById('f_doNo').value = d.do_no || '';
            document.getElementById('f_remark').value = d.remark || '';
            document.getElementById('addModal').classList.add('active');
        }

        async function saveDelivery(e) {
            e.preventDefault();
            
            const data = {
                date: document.getElementById('f_date').value,
                location: document.getElementById('f_location').value,
                load_date: document.getElementById('f_loadDate').value,
                unload_date: document.getElementById('f_unloadDate').value,
                lorry: document.getElementById('f_lorry').value,
                price: document.getElementById('f_price').value,
                do_no: document.getElementById('f_doNo').value,
                remark: document.getElementById('f_remark').value
            };

            try {
                if (editIdx) {
                    // UPDATE
                    const { error } = await supabase
                        .from('deliveries')
                        .update(data)
                        .eq('id', editIdx);
                    
                    if (error) throw error;
                    showToast('Updated');
                } else {
                    // INSERT
                    const { error } = await supabase
                        .from('deliveries')
                        .insert([data]);
                    
                    if (error) throw error;
                    showToast('Added');
                }
                
                closeAddModal();
                await loadData();
            } catch (err) {
                console.error(err);
                showToast('Error: ' + err.message);
            }
        }

        async function deleteDelivery(id) {
            if (currentUser !== 'Solid Horizon') return;
            if (!confirm('Delete?')) return;

            try {
                const { error } = await supabase
                    .from('deliveries')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                showToast('Deleted');
                await loadData();
            } catch (err) {
                showToast('Error: ' + err.message);
            }
        }

        async function updateRemark(id, val) {
            if (currentUser !== 'Solid Horizon') return;

            try {
                await supabase
                    .from('deliveries')
                    .update({ remark: val })
                    .eq('id', id);
            } catch (err) {
                console.error(err);
            }
        }

        // SEARCH
        function filterTable() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('#newBody tr, #historyBody tr').forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(term) ? '' : 'none';
            });
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            filterTable();
        }

        // TABS
        function switchTab(e, tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        // EXPORT
        function exportData() {
            const data = JSON.stringify({deliveries, exportDate: new Date().toLocaleString()}, null, 2);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'delivery_data_' + Date.now() + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported');
        }

        // IMPORT
        async function importData(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    const toInsert = data.deliveries.map(d => ({
                        date: d.date,
                        location: d.location,
                        load_date: d.load_date || d.loadDate,
                        unload_date: d.unload_date || d.unloadDate,
                        lorry: d.lorry,
                        price: d.price,
                        do_no: d.do_no || d.doNo,
                        remark: d.remark
                    }));

                    const { error } = await supabase
                        .from('deliveries')
                        .insert(toInsert);

                    if (error) throw error;
                    showToast(`Imported ${toInsert.length} deliveries`);
                    await loadData();
                } catch (err) {
                    showToast('Import error: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        // TOAST
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
    </script>
